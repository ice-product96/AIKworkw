# Example for host nginx (ports 80/443 already in use).
# Install: sudo cp docker/nginx-host.example.conf /etc/nginx/sites-available/aikworkw
#          sudo ln -s /etc/nginx/sites-available/aikworkw /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# AIKworkw frontend container listens on 127.0.0.1:8011 and proxies /api/ to backend.

server {
    listen 443 ssl http2;
    server_name aikworkw.example.com;

    ssl_certificate     /etc/letsencrypt/live/aikworkw.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aikworkw.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name aikworkw.example.com;
    return 301 https://$host$request_uri;
}
